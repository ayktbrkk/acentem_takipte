name: Coolify GHCR Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'acentem_takipte/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'docs/examples/Dockerfile.coolify.example'
      - '.github/workflows/coolify-ghcr-image.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/acentem-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs/examples/Dockerfile.coolify.example
          build-args: |
            FRAPPE_BRANCH=version-15
            FRAPPE_IMAGE_PREFIX=ghcr.io/frappe
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
