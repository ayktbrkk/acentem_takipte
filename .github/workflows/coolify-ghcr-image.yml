name: Coolify GHCR Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'acentem_takipte/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'docs/examples/Dockerfile.coolify.example'
      - 'docs/examples/docker-entrypoint.frontend.coolify.example.sh'
      - 'docs/examples/nginx.default.conf.coolify.example.template'
      - 'docs/examples/docker-compose.coolify.example.yml'
      - 'docs/examples/sync-assets-manifest.py'
      - '.github/workflows/coolify-ghcr-image.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/acentem-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docs/examples/Dockerfile.coolify.example
          build-args: |
            FRAPPE_BRANCH=version-15
            FRAPPE_IMAGE_PREFIX=ghcr.io/frappe
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
