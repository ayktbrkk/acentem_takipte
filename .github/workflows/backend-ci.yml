name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - "acentem_takipte/**"
      - ".github/workflows/backend-ci.yml"
      - "pyproject.toml"
      - "requirements.txt"
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "acentem_takipte/**"
      - ".github/workflows/backend-ci.yml"
      - "pyproject.toml"
      - "requirements.txt"

jobs:
  frappe-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: mysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      BENCH_DIR: frappe-bench-ci
      SITE_NAME: test.localhost
      ADMIN_PASSWORD: admin
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_ROOT_USER: root
      DB_ROOT_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mariadb-client \
            redis-tools \
            libffi-dev \
            libssl-dev \
            libjpeg-dev \
            zlib1g-dev \
            liblcms2-dev \
            libwebp-dev \
            libsasl2-dev \
            libldap2-dev \
            libpq-dev \
            libxml2-dev \
            libxslt1-dev \
            libmariadb-dev

      - name: Install bench CLI
        run: pip install --upgrade pip frappe-bench

      - name: Initialize bench
        run: bench init "$BENCH_DIR" --frappe-branch version-15 --skip-redis-config-generation --python python3

      - name: Configure bench services
        working-directory: ${{ env.BENCH_DIR }}
        run: |
          bench set-config -g db_host "$DB_HOST"
          bench set-config -g db_port "$DB_PORT"
          bench set-config -g redis_cache "redis://127.0.0.1:6379"
          bench set-config -g redis_queue "redis://127.0.0.1:6379"
          bench set-config -g redis_socketio "redis://127.0.0.1:6379"

      - name: Link current app into bench
        working-directory: ${{ env.BENCH_DIR }}
        run: bench get-app --soft-link "$GITHUB_WORKSPACE"

      - name: Create test site
        working-directory: ${{ env.BENCH_DIR }}
        run: |
          bench new-site "$SITE_NAME" \
            --admin-password "$ADMIN_PASSWORD" \
            --db-host "$DB_HOST" \
            --db-port "$DB_PORT" \
            --db-root-username "$DB_ROOT_USER" \
            --db-root-password "$DB_ROOT_PASSWORD" \
            --no-mariadb-socket

      - name: Install app and run tests
        working-directory: ${{ env.BENCH_DIR }}
        run: |
          bench --site "$SITE_NAME" install-app acentem_takipte
          bench --site "$SITE_NAME" run-tests --app acentem_takipte
