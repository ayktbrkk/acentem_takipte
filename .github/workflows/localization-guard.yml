name: localization-guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "acentem_takipte/translations/**"
      - "tools/localization_guard.py"
      - ".github/workflows/localization-guard.yml"

jobs:
  localization-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run localization guard
        run: python tools/localization_guard.py
