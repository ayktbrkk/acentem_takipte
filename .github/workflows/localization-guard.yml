name: localization-guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "acentem_takipte/translations/**"
      - "tools/localization_guard.py"
      - ".github/workflows/localization-guard.yml"

jobs:
  localization-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Run localization guard
        run: python tools/localization_guard.py
