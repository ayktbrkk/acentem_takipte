services:
  backend:
    image: ${APP_IMAGE:?}
    user: frappe
    restart: always
    working_dir: /home/frappe/frappe-bench/sites
    command:
      - /bin/sh
      - -lc
      - |
        python3 /usr/local/bin/sync-assets-manifest.py
        export PATH=/home/frappe/.nvm/versions/node/v20.20.2/bin:$$PATH
        exec /home/frappe/frappe-bench/env/bin/gunicorn --bind=0.0.0.0:8000 --threads=4 --workers=2 --worker-class=gthread --worker-tmp-dir=/dev/shm --timeout=120 --preload frappe.app:application
    environment:
      SITE_NAME: ${SITE_NAME:?}
      INSTALL_APPS: ${INSTALL_APPS:-acentem_takipte}
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:?}
    volumes:
      - app_sites:/home/frappe/frappe-bench/sites
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/api/method/ping', timeout=5)\nPY"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    image: ${APP_IMAGE:?}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      websocket:
        condition: service_healthy
    expose:
      - "8080"
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:?}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - app_sites:/home/frappe/frappe-bench/sites
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8080/login', timeout=5)\nPY"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  websocket:
    image: ${APP_IMAGE:?}
    user: frappe
    restart: always
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - app_sites:/home/frappe/frappe-bench/sites
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(9000, '127.0.0.1').on('connect', function(){ this.end(); process.exit(0); }).on('error', function(){ process.exit(1); })\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  configurator:
    image: ${APP_IMAGE:?}
    user: frappe
    working_dir: /home/frappe/frappe-bench/sites
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      redis-socketio:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        ../env/bin/python - <<'PY'
        import json
        from pathlib import Path

        path = Path("common_site_config.json")
        config = {}
        if path.exists():
            config = json.loads(path.read_text())

        config.update(
            {
                "db_host": "mariadb",
                "redis_cache": "redis://redis-cache:6379",
                "redis_queue": "redis://redis-queue:6379",
                "redis_socketio": "redis://redis-socketio:6379",
                "dns_multitenant": True,
                "default_site": "${SITE_NAME}",
                "serve_default_site": True,
                "socketio_port": 9000,
            }
        )

        path.write_text(json.dumps(config, indent=2) + "\n")
        PY

        if [ ! -d "${SITE_NAME}" ]; then
          bench new-site "${SITE_NAME}" \
            --db-root-username "${DB_ROOT_USER:-root}" \
            --mariadb-root-password "${MYSQL_ROOT_PASSWORD}" \
            --admin-password "${ADMIN_PASSWORD}" \
            --no-mariadb-socket
        fi

        for app in $$(printf '%s' "${INSTALL_APPS:-acentem_takipte}" | tr ',' ' '); do
          if [ -n "$$app" ] && ! bench --site "${SITE_NAME}" list-apps | grep -qx "$$app"; then
            bench --site "${SITE_NAME}" install-app "$$app"
          fi
        done

        cd /home/frappe/frappe-bench/sites
        bench --site "${SITE_NAME}" migrate
        bench --site "${SITE_NAME}" clear-cache
        bench --site "${SITE_NAME}" clear-website-cache
    volumes:
      - app_sites:/home/frappe/frappe-bench/sites

  mariadb:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis-cache:
    image: redis:6.2
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-queue:
    image: redis:6.2
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-socketio:
    image: redis:6.2
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  app_sites:
  db_data:
