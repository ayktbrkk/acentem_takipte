<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Acentem Takipte Icon</title>
  <desc id="desc">Turquoise rounded square icon with AT letters</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0a3f3b" flood-opacity="0.25" />
    </filter>
  </defs>
  <rect x="24" y="24" width="464" height="464" rx="110" fill="url(#bg)" filter="url(#shadow)" />
  <g fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="210" font-weight="800" text-anchor="middle">
    <text x="256" y="322">AT</text>
  </g>
</svg>
